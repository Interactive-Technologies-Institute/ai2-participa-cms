# ─────────────────────────────────────────────────────────────────────────────
# Sveltia CMS Configuration — AI²Participa
# Docs: https://github.com/sveltia/sveltia-cms
# ─────────────────────────────────────────────────────────────────────────────
#
# LOCAL DEVELOPMENT (no extra setup needed):
#   1. Run: npm run dev
#   2. Open: http://localhost:5173/admin/index.html
#   3. Click "Work with Local Repository" → select this project folder
#   Sveltia CMS uses the browser's File System Access API to read/write your
#   local files directly. Changes are picked up instantly by the dev server.
#
# PRODUCTION — set up GitHub OAuth (choose one approach):
#
#   Option A — Netlify hosting (simplest):
#     1. Enable Netlify Identity + Git Gateway in your Netlify site settings.
#     2. Change the backend name below to: git-gateway
#     3. Remove the base_url line.
#
#   Option B — Any static host (GitHub Pages, Vercel, Cloudflare Pages, etc.):
#     1. Deploy the Sveltia CMS Auth Cloudflare Worker:
#        https://github.com/sveltia/sveltia-cms-auth
#     2. Uncomment and set base_url below to your worker URL.
#
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: Interactive-Technologies-Institute/ai2-participa-cms
  branch: main
  base_url: https://sveltia-cms-auth.nunojnunes.workers.dev  # ← Uncomment for production (Option B)

media_folder: static/images
public_folder: /images

# ─── Reusable field groups (YAML anchors) ────────────────────────────────────

_body_pt: &body_pt
  name: pt
  label: Português
  widget: object
  fields:
    - { name: body, label: Conteúdo, widget: markdown }

_body_en: &body_en
  name: en
  label: English
  widget: object
  fields:
    - { name: body, label: Content, widget: markdown }

# ─── Collections ─────────────────────────────────────────────────────────────

collections:

  # ── Pages ──────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    files:

      # Home
      - name: home
        label: Home
        file: src/lib/content/home.json
        fields:
          - name: pt
            label: Português
            widget: object
            fields:
              - { name: heading, label: Título Principal, widget: string }
              - { name: body, label: Corpo da Página, widget: markdown }
              - { name: cta_text, label: Texto CTA, widget: text }
              - { name: participate_url, label: URL do Botão Participar, widget: string }
          - name: en
            label: English
            widget: object
            fields:
              - { name: heading, label: Main Heading, widget: string }
              - { name: body, label: Page Body, widget: markdown }
              - { name: cta_text, label: CTA Text, widget: text }
              - { name: participate_url, label: Participate Button URL, widget: string }

      # Participação Pública
      - name: participacao-publica
        label: Participação Pública / Public Participation
        file: src/lib/content/participacao-publica.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Metodologia de Participação Pública
      - name: metodologia-participacao-publica
        label: Metodologia de Participação Pública / Public Participation Methodology
        file: src/lib/content/metodologia-participacao-publica.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Comissão de Acompanhamento
      - name: comissao-acompanhamento
        label: Comissão de Acompanhamento / Advisory Committee
        file: src/lib/content/comissao-acompanhamento.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Reuniões com Entidades
      - name: reunioes-entidades
        label: Reuniões com Entidades / Stakeholder Meetings
        file: src/lib/content/reunioes-entidades.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Mesas Temáticas
      - name: mesas-tematicas
        label: Mesas Temáticas / Thematic Roundtables
        file: src/lib/content/mesas-tematicas.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Workshops Descentralizados
      - name: workshops-descentralizados
        label: Workshops Descentralizados / Decentralised Workshops
        file: src/lib/content/workshops-descentralizados.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Iniciativas Bottom-up
      - name: iniciativas-bottom-up
        label: Iniciativas Bottom-up
        file: src/lib/content/iniciativas-bottom-up.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Apresentação Pública
      - name: apresentacao-publica
        label: Apresentação Pública / Public Presentation
        file: src/lib/content/apresentacao-publica.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Relatórios
      - name: relatorios
        label: Relatórios / Reports
        file: src/lib/content/relatorios.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Metodologia ST4S
      - name: metodologia-st4s
        label: Metodologia ST4S / ST4S Methodology
        file: src/lib/content/metodologia-st4s.json
        fields:
          - <<: *body_pt
          - <<: *body_en
          - name: doc_url
            label: URL do Documento PDF
            widget: string
            hint: Caminho para o PDF (ex. /docs/RelatMetod_PT.pdf)

      # Metodologia de Avaliação Estratégica da AI²
      - name: metodologia-avaliacao-estrategica
        label: Metodologia de Avaliação Estratégica / Strategic Assessment Methodology
        file: src/lib/content/metodologia-avaliacao-estrategica.json
        fields:
          - <<: *body_pt
          - <<: *body_en
          - name: doc_url
            label: URL do Documento PDF
            widget: string
            hint: Caminho para o PDF (ex. /docs/RelatMetod_PT.pdf)

      # Legislação Nacional
      - name: legislacao-nacional
        label: Legislação Nacional / National Legislation
        file: src/lib/content/legislacao-nacional.json
        fields:
          - <<: *body_pt
          - <<: *body_en

      # Coordenação
      - name: coordenacao
        label: Coordenação / Coordination
        file: src/lib/content/coordenacao.json
        fields:
          - name: pt
            label: Português
            widget: object
            fields:
              - { name: intro, label: Introdução, widget: markdown }
              - { name: scientific_bio, label: Biografia Científica, widget: markdown }
              - { name: institutional_bio, label: Biografia Institucional, widget: markdown }
          - name: en
            label: English
            widget: object
            fields:
              - { name: intro, label: Introduction, widget: markdown }
              - { name: scientific_bio, label: Scientific Bio, widget: markdown }
              - { name: institutional_bio, label: Institutional Bio, widget: markdown }
          - name: scientific_coordinator_name
            label: Nome do Coordenador Científico
            widget: string
          - name: scientific_coordinator_image
            label: Foto do Coordenador Científico
            widget: image

      # Equipa de Peritos
      - name: equipa-peritos
        label: Equipa de Peritos / Expert Team
        file: src/lib/content/equipa-peritos.json
        fields:
          - name: pt
            label: Português
            widget: object
            fields:
              - { name: intro, label: Introdução, widget: markdown }
              - name: section_titles
                label: Títulos das Secções
                widget: list
                hint: Deve ter 6 títulos, um por cada secção temática
          - name: en
            label: English
            widget: object
            fields:
              - { name: intro, label: Introduction, widget: markdown }
              - name: section_titles
                label: Section Titles
                widget: list
                hint: Must have 6 titles, one per thematic section
          - name: sections
            label: Secções (Pessoas)
            widget: list
            hint: Cada secção contém uma lista de peritos
            fields:
              - name: people
                label: Peritos
                widget: list
                fields:
                  - { name: name, label: Nome, widget: string }
                  - { name: image, label: Foto, widget: image }
